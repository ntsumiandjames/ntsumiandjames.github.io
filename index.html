<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Castlebeam</title>
    <style>
        body { 
            font-family: Futura, sans-serif; 
            margin: 0; 
            padding: 0; 
            background-color: #fff;
            overflow: hidden; /* パソコンでスクロールバーを出さない */
        }
        
        .header {
            position: absolute;
            top: 20px;
            left: 40px;
            z-index: 10;
        }
        
        h1 { 
            color: #333; 
            margin: 0;
            font-size: 2em;
        }
        
        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between; /* 上・中・下に均等配置 */
            height: 100vh; /* 画面の高さ100%に固定 */
            box-sizing: border-box;
            padding: 80px 20px 20px 20px;
        }

        /* 画像を中央に寄せ、バランスを整えるコンテナ */
        .image-container {
            display: flex;
            flex-wrap: nowrap;
            justify-content: center;
            align-items: center;
            gap: 40px; /* ポスター同士の間隔 */
            width: 100%;
            max-width: 1000px; /* 広がりすぎを防いで中央に寄せる */
            flex-grow: 1; 
            min-height: 0; 
            margin: 0 auto;
        }
        
        .image-container img { 
            height: 90%; /* コンテナ内での高さ */
            width: auto;
            object-fit: contain;
        }

        /* 右のポスター（Sumo101）だけ少し大きくする */
        .poster-sumo {
            transform: scale(1.15); /* 15%拡大 */
            transform-origin: center;
        }
        
        .contact-info {
            text-align: center;
            color: #333;
            margin: 15px 0 5px 0;
            line-height: 1.2; /* 行間を狭く */
            flex-shrink: 0;
        }
        
        .contact-info p {
            margin: 2px 0;
            font-size: 15px;
        }
        
        .contact-info .email {
            font-weight: bold;
            color: #0066cc;
        }
        
        footer {
            width: 100%;
            text-align: center;
            padding-bottom: 15px;
            font-size: 11px; 
            color: #999;
            flex-shrink: 0;
        }

        /* スマホ・タブレット用の調整 */
        @media (max-width: 768px) {
            body {
                overflow: auto; /* スマホはスクロールを許可 */
            }
            .main-content {
                height: auto;
                min-height: 100vh;
                padding-top: 100px;
            }
            .image-container {
                flex-direction: column;
                height: auto;
                gap: 30px;
            }
            .image-container img {
                width: 80vw;
                height: auto;
                max-height: 40vh;
            }
            .poster-sumo {
                transform: scale(1); /* スマホでは拡大を解除してバランスをとる */
            }
            footer {
                margin-top: 30px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Castlebeam</h1>
    </div>
    
    <div class="main-content">
        <div class="image-container">
            <img src="260514_Echoes of the Forgotten_Poster.jpg" alt="Echoes of the Forgotten Poster" class="poster-echoes">
            <img src="Sumo101_poster_noBackground.png" alt="Sumo101 Poster" class="poster-sumo">
        </div>

        <div class="contact-info">
            <p class="email">info@castlebeam.com</p>
            <p>Film Production Company</p>
            <p>Los Angeles, CA</p>
        </div>
        
        <footer>
            Copyright ©2025 Castlebeam LLC. All rights reserved.
        </footer>
    </div>
</body>
</html>
