<!DOCTYPE html>
<html>
<head>
    <title>Castlebeam</title>
<style>
    /* （上部はそのまま） */
    body { 
        font-family: Futura, sans-serif; 
        margin: 0; 
        padding: 0; 
        background-color: #fff;
    }
    
    .header {
        position: absolute;
        top: 20px;
        left: 40px;
        z-index: 10;
    }
    
    h1 { 
        color: #333; 
        margin: 0;
        font-size: 2em;
    }
    
    .main-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-between; /* 上・中・下に均等配置 */
        height: 100vh; /* 画面の高さ100%に固定 */
        box-sizing: border-box;
        padding: 80px 20px 20px 20px; /* 上にタイトル用の余白 */
    }

    .image-container {
        display: flex;
        flex-wrap: nowrap;
        justify-content: center;
        align-items: center;
        gap: 30px;
        flex-grow: 1; /* 画像エリアが可能な限り広がる */
        min-height: 0; /* はみ出し防止の重要設定 */
        width: 100%;
    }
    
    .image-container img { 
        max-height: 100%; /* 親要素(flex-grow)の高さに合わせる */
        max-width: 45vw; 
        height: auto;
        width: auto;
        object-fit: contain;
    }
    
    .contact-info {
        text-align: center;
        color: #333;
        margin: 20px 0 10px 0; /* 上下の余白 */
        line-height: 1.2;
        flex-shrink: 0; /* 連絡先が潰れないように固定 */
    }
    
    footer {
        width: 100%;
        text-align: center;
        padding-bottom: 10px;
        font-size: 11px; 
        color: #999;
        flex-shrink: 0; /* フッターが潰れないように固定 */
    }

    /* スマホでは縦に並べるが、スクロールは許可する */
    @media (max-width: 768px) {
        .main-content {
            height: auto; /* スマホは画面が狭いのでスクロールOKに */
            min-height: 100vh;
        }
        .image-container {
            flex-direction: column;
            height: auto;
        }
        .image-container img {
            width: 80vw;
            max-height: 40vh;
        }
    }
    
    .contact-info {
        text-align: center;
        color: #333;
        margin-top: 10px; /* 画像との間隔 */
        line-height: 1.2; /* ★行間を狭くしました（標準は1.5〜1.6）★ */
    }
    
    .contact-info p {
        margin: 2px 0; /* ★段落前後の余白を最小限にしました★ */
        font-size: 15px;
    }
    
    .contact-info .email {
        font-weight: bold;
        color: #0066cc;
        margin-bottom: 5px; /* メールアドレスの下だけ少しあける */
    }
    
    footer {
        /* position: fixed をやめて、自然な流れで下に配置します */
        width: 100%;
        text-align: center;
        margin-top: 50px; /* ★上のコンテンツとの間にしっかり余白を作ります★ */
        padding-bottom: 20px;
        font-size: 11px; 
        color: #999; 
        position: relative; /* 固定を解除 */
    }
</style>
</head>
<body>
    <div class="header">
        <h1>Castlebeam</h1>
    </div>
    
    <div class="main-content">
        <div class="image-container">
            <img src="260514_Echoes of the Forgotten_Poster.jpg" alt="Echoes of the Forgotten Poster">
            <img src="Sumo101_poster_noBackground.png" alt="Sumo101 Poster">
        </div>

        <div class="contact-info">
            <p class="email">info@castlebeam.com</p>
            <p>Film Production Company</p>
            <p>Los Angeles, CA</p>
        </div>
        
        <footer>
            Copyright ©2025 Castlebeam LLC. All rights reserved.
        </footer>
    </div>
</body>
</html>
