<!DOCTYPE html>
<html>
<head>
    <title>Castlebeam</title>
    <style>
        body { 
            font-family: Futura, sans-serif; 
            margin: 0; 
            padding: 0; 
            background-color: #fff;
        }
        
        .header {
            position: absolute;
            top: 20px;
            left: 40px;
            z-index: 10;
        }
        
        h1 { 
            color: #333; 
            margin: 0;
            font-size: 2em;
        }
        
        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        /* 画像を横に並べるための設定 */
        .image-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 40px; /* ポスター間の距離 */
            width: 100%;
            margin-bottom: 30px;
        }
        
        .image-container img { 
            max-height: 70vh; 
            max-width: 40vw; 
            object-fit: contain;
        }
        
        /* スマホ・タブレットでは縦に並べる */
        @media (max-width: 768px) {
            .image-container {
                flex-direction: column;
                gap: 20px;
            }
            .image-container img {
                max-width: 80vw;
                max-height: 50vh;
            }
        }
        
        .contact-info {
            text-align: center;
            color: #333;
        }
        
        .contact-info p {
            margin: 5px 0;
            font-size: 16px;
        }
        
        .contact-info .email {
            font-weight: bold;
            color: #0066cc;
        }
        
        footer {
            position: fixed; 
            bottom: 10px; 
            left: 50%; 
            transform: translateX(-50%); 
            font-size: 11px; 
            color: #999; 
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Castlebeam</h1>
    </div>
    
    <div class="main-content">
        <div class="image-container">
            <img src="260514_Echoes of the Forgotten_Poster.jpg" alt="Echoes of the Forgotten Poster">
            <img src="Sumo101_poster_noBackground.png" alt="Sumo101 Poster">
        </div>

        <div class="contact-info">
            <p class="email">info@castlebeam.com</p>
            <p>Film Production Company</p>
            <p>Los Angeles, CA</p>
        </div>
    </div>
    
    <footer>
        Copyright ©2025 Castlebeam LLC. All rights reserved.
    </footer>    
</body>
</html>
