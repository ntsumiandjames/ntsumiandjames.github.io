<!DOCTYPE html>
<html>
<head>
    <title>Castlebeam</title>
<style>
    /* （上部はそのまま） */
    body { 
        font-family: Futura, sans-serif; 
        margin: 0; 
        padding: 0; 
        background-color: #fff;
    }
    
    .header {
        position: absolute;
        top: 20px;
        left: 40px;
        z-index: 10;
    }
    
    h1 { 
        color: #333; 
        margin: 0;
        font-size: 2em;
    }
    
    .main-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 60px 20px; /* 少し余白を広げました */
    }

    /* 画像を中央に寄せてバランスを整える設定 */
    .image-container {
        display: flex;
        flex-wrap: nowrap;
        justify-content: center; /* これで全体を中央に寄せます */
        align-items: center;
        gap: 20px; /* ポスター間の隙間を少し狭くして、一体感を出します */
        width: 100%; /* 幅をいっぱい使って中央配置を安定させます */
        max-width: 800px; 
        margin: 0 auto 40px auto; /* 左右の余白を auto にしてコンテナ自体を中央に */
        height: 65vh;
    }
    
    .image-container img { 
        height: 100%;
        width: auto;
        object-fit: contain;
        /* 画像自体の左右の余白を少し削って、より中央に寄せます */
        margin: 0 -10px; 
    }
    
    /* スマホ・タブレットでの調整（縦並びにする） */
    @media (max-width: 768px) {
        .image-container {
            flex-direction: column;
            flex-wrap: wrap;
            height: auto; /* 縦並びなので高さ制限を解除 */
            gap: 30px;
        }
        .image-container img {
            width: 80vw; /* 横幅を基準にする */
            height: auto; /* 高さは自動 */
            max-height: 45vh; /* 大きくなりすぎないように */
        }
    }
    
    .contact-info {
        text-align: center;
        color: #333;
        margin-top: 10px; /* 画像との間隔 */
        line-height: 1.2; /* ★行間を狭くしました（標準は1.5〜1.6）★ */
    }
    
    .contact-info p {
        margin: 2px 0; /* ★段落前後の余白を最小限にしました★ */
        font-size: 15px;
    }
    
    .contact-info .email {
        font-weight: bold;
        color: #0066cc;
        margin-bottom: 5px; /* メールアドレスの下だけ少しあける */
    }
    
    footer {
        /* position: fixed をやめて、自然な流れで下に配置します */
        width: 100%;
        text-align: center;
        margin-top: 50px; /* ★上のコンテンツとの間にしっかり余白を作ります★ */
        padding-bottom: 20px;
        font-size: 11px; 
        color: #999; 
        position: relative; /* 固定を解除 */
    }
</style>
</head>
<body>
    <div class="header">
        <h1>Castlebeam</h1>
    </div>
    
    <div class="main-content">
        <div class="image-container">
            <img src="260514_Echoes of the Forgotten_Poster.jpg" alt="Echoes of the Forgotten Poster">
            <img src="Sumo101_poster_noBackground.png" alt="Sumo101 Poster">
        </div>

        <div class="contact-info">
            <p class="email">info@castlebeam.com</p>
            <p>Film Production Company</p>
            <p>Los Angeles, CA</p>
        </div>
        
        <footer>
            Copyright ©2025 Castlebeam LLC. All rights reserved.
        </footer>
    </div>
</body>
</html>
