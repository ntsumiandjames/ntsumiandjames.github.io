<!DOCTYPE html>
<html>
<head>
    <title>Castlebeam</title>
<style>
    /* （上部はそのまま） */
    body { 
        font-family: Futura, sans-serif; 
        margin: 0; 
        padding: 0; 
        background-color: #fff;
    }
    
    .header {
        position: absolute;
        top: 20px;
        left: 40px;
        z-index: 10;
    }
    
    h1 { 
        color: #333; 
        margin: 0;
        font-size: 2em;
    }
    
    .main-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 60px 20px; /* 少し余白を広げました */
    }

    /* ★ここから修正：画像の高さを揃える設定★ */
    .image-container {
        display: flex;
        flex-wrap: nowrap; /* 横に並べる */
        justify-content: center;
        align-items: center; /* 縦方向の中央揃え */
        gap: 50px; /* ポスター間の距離 */
        width: auto; /* コンテナの幅を画像に合わせる */
        max-width: 90vw; /* 画面からはみ出さないように */
        margin-bottom: 40px;
        height: 65vh; /* ★コンテナ自体の高さを決める（画面の65%）★ */
    }
    
    .image-container img { 
        height: 100%; /* ★親コンテナ（65vh）の高さいっぱいに広げる★ */
        width: auto; /* 幅は自動調整（アスペクト比を維持） */
        object-fit: contain; /* 画像全体を表示する */
    }
    
    /* スマホ・タブレットでの調整（縦並びにする） */
    @media (max-width: 768px) {
        .image-container {
            flex-direction: column;
            flex-wrap: wrap;
            height: auto; /* 縦並びなので高さ制限を解除 */
            gap: 30px;
        }
        .image-container img {
            width: 80vw; /* 横幅を基準にする */
            height: auto; /* 高さは自動 */
            max-height: 45vh; /* 大きくなりすぎないように */
        }
    }
    
    .contact-info {
        text-align: center;
        color: #333;
    }
    
    .contact-info p {
        margin: 5px 0;
        font-size: 16px;
    }
    
    .contact-info .email {
        font-weight: bold;
        color: #0066cc;
    }
    
    footer {
        position: fixed; 
        bottom: 10px; 
        left: 50%; 
        transform: translateX(-50%); 
        font-size: 11px; 
        color: #999; 
        white-space: nowrap;
        background: rgba(255,255,255,0.8);
        padding: 2px 10px;
        border-radius: 4px;
    }
</style>
</head>
<body>
    <div class="header">
        <h1>Castlebeam</h1>
    </div>
    
    <div class="main-content">
        <div class="image-container">
            <img src="260514_Echoes of the Forgotten_Poster.jpg" alt="Echoes of the Forgotten Poster">
            <img src="Sumo101_poster_noBackground.png" alt="Sumo101 Poster">
        </div>

        <div class="contact-info">
            <p class="email">info@castlebeam.com</p>
            <p>Film Production Company</p>
            <p>Los Angeles, CA</p>
        </div>
    </div>
    
    <footer>
        Copyright ©2025 Castlebeam LLC. All rights reserved.
    </footer>    
</body>
</html>
